<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>PZ Color Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111317;
    --border: #1e2028;
    --accent: #ff6b35;
    --accent2: #00e5cc;
    --text: #d0d4e0;
    --muted: #4a4f5e;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: var(--display);
    font-size: clamp(2.5rem, 6vw, 4rem);
    letter-spacing: 0.12em;
    color: #fff;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }

  header p {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .wrapper {
    width: 100%;
    max-width: 880px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .wrapper { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }

  /* ── Preview ── */
  .preview-wrap {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: center;
  }

  @media (max-width: 640px) {
    .preview-wrap { grid-template-columns: 1fr; }
  }

  #colorPreview {
    height: 140px;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: background 0.12s ease;
    position: relative;
    overflow: hidden;
  }

  #colorPreview::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  }

  .code-block {
    background: #0d0f12;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    min-width: 210px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .code-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .code-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .code-val {
    font-size: 0.88rem;
    color: var(--accent2);
    cursor: pointer;
    transition: color 0.2s;
  }

  .code-val:hover { color: #fff; }

  .copy-btn {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .copy-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .copy-btn.copied {
    border-color: #4ade80;
    color: #4ade80;
  }

  /* ── Sliders ── */
  .panel-title {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .slider-row {
    margin-bottom: 18px;
  }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .slider-name {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .slider-val {
    font-size: 1rem;
    color: #fff;
    min-width: 32px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    box-shadow: 0 0 8px rgba(255,107,53,0.5);
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  #hue { background: linear-gradient(to right, #ff0000,#ff6600,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000); }
  #sat { background: linear-gradient(to right, #888, #ff6b35); }
  #val { background: linear-gradient(to right, #000, #fff); }

  /* number input boxes */
  .num-inputs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .num-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .num-wrap label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .num-wrap input[type=number] {
    background: #0d0f12;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 5px 8px;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }

  .num-wrap input[type=number]::-webkit-inner-spin-button { display: none; }
  .num-wrap input[type=number]:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* ── Presets ── */
  .presets-wrap { grid-column: 1 / -1; }

  .presets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-top: 4px;
  }

  .preset-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 6px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    font-family: var(--mono);
  }

  .preset-btn:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .preset-btn.active {
    border-color: var(--accent2);
    box-shadow: 0 0 0 1px var(--accent2);
  }

  .preset-swatch {
    width: 44px;
    height: 44px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s;
  }

  .preset-btn:hover .preset-swatch { transform: scale(1.08); }

  .preset-name {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: #fff;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.2;
  }

  .preset-hsv {
    font-size: 0.55rem;
    color: var(--muted);
    text-align: center;
  }

  /* ── Hex input ── */
  .hex-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .hex-input-row label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .hex-input-row input[type=text] {
    flex: 1;
    background: #0d0f12;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 5px 10px;
    text-align: center;
  }

  .hex-input-row input[type=text]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .go-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }

  .go-btn:hover { opacity: 0.8; }

  /* section groups */
  .preset-group-label {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 14px 0 6px;
  }

  .preset-group-label:first-child { margin-top: 4px; }

</style>

    <div class="panel-title">Color Presets</div>
    <div id="allPresetsContainer"></div>

</div>

// ─── Helpers ─────────────────────────────────────────────
function hsvToRgb(h, s, v) {
  let hd = (h / 100) * 360, ss = s / 100, vv = v / 100;
  let c = vv * ss, x = c * (1 - Math.abs((hd / 60) % 2 - 1)), m = vv - c;
  let r = 0, g = 0, b = 0;
  if (hd < 60)       { r=c; g=x; b=0; }
  else if (hd < 120) { r=x; g=c; b=0; }
  else if (hd < 180) { r=0; g=c; b=x; }
  else if (hd < 240) { r=0; g=x; b=c; }
  else if (hd < 300) { r=x; g=0; b=c; }
  else               { r=c; g=0; b=x; }
  return { r: Math.round((r+m)*255), g: Math.round((g+m)*255), b: Math.round((b+m)*255) };
}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map(x => x.toString(16).padStart(2,"0")).join("").toUpperCase();
}

function hexToRgb(hex) {
  hex = hex.replace(/^#/,"");
  if (hex.length === 3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex, 16);
  return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
}

function rgbToHsv(r, g, b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0, s=max===0?0:d/max, v=max;
  if (d!==0) {
    if (max===r) h=((g-b)/d)%6;
    else if (max===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h = h*60; if (h<0) h+=360;
  }
  return {
    h: Math.round(h/3.6),
    s: Math.round(s*100),
    v: Math.round(v*100)
  };
}

async function copyText(id, btn) {
  const txt = document.getElementById(id).textContent;
  await navigator.clipboard.writeText(txt).catch(()=>{});
  btn.textContent = "OK!";
  btn.classList.add("copied");
  setTimeout(()=>{ btn.textContent="COPY"; btn.classList.remove("copied"); }, 1500);
}

// ─── State & UI ──────────────────────────────────────────
const sliders = { hue: document.getElementById("hue"), sat: document.getElementById("sat"), val: document.getElementById("val") };
const nums    = { h: document.getElementById("nH"),   s: document.getElementById("nS"),   v: document.getElementById("nV") };

function updateColor(src) {
  let h = +sliders.hue.value, s = +sliders.sat.value, v = +sliders.val.value;

  document.getElementById("hVal").textContent = h;
  document.getElementById("sVal").textContent = s;
  document.getElementById("vVal").textContent = v;

  if (src !== "num") { nums.h.value = h; nums.s.value = s; nums.v.value = v; }
  if (src !== "range") { sliders.hue.value = h; sliders.sat.value = s; sliders.val.value = v; }

  // update sat gradient based on hue
  const { r: hr, g: hg, b: hb } = hsvToRgb(h, 100, 100);
  sliders.sat.style.background = `linear-gradient(to right, #888, rgb(${hr},${hg},${hb}))`;
  sliders.val.style.background = `linear-gradient(to right, #000, rgb(${hr},${hg},${hb}))`;

  const { r, g, b } = hsvToRgb(h, s, v);
  const hex = rgbToHex(r, g, b);

  document.getElementById("colorPreview").style.background = `rgb(${r},${g},${b})`;
  document.getElementById("outHSV").textContent = `${h}, ${s}, ${v}`;
  document.getElementById("outRGB").textContent = `${r}, ${g}, ${b}`;
  document.getElementById("outHEX").textContent = hex;
  document.getElementById("outLUA").textContent = `r=${r/255|0}.${(''+Math.round(r/255*1000)).slice(-3)},g=…`;
  // Better lua output
  const rf = (r/255).toFixed(3), gf = (g/255).toFixed(3), bf = (b/255).toFixed(3);
  document.getElementById("outLUA").textContent = `${rf}, ${gf}, ${bf}`;

  // highlight active preset
  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.classList.toggle("active",
      +btn.dataset.h === h && +btn.dataset.s === s && +btn.dataset.v === v
    );
  });
}

function setHSV(h, s, v) {
  sliders.hue.value = h; sliders.sat.value = s; sliders.val.value = v;
  updateColor("range");
}

function hexToSliders() {
  const hex = document.getElementById("hexInput").value.trim();
  if (!hex) return;
  const {r, g, b} = hexToRgb(hex);
  const {h, s, v} = rgbToHsv(r, g, b);
  setHSV(h, s, v);
}

// range sliders
Object.values(sliders).forEach(el => el.addEventListener("input", () => updateColor("range")));
// num inputs
Object.values(nums).forEach(el => el.addEventListener("input", () => {
  sliders.hue.value = nums.h.value;
  sliders.sat.value = nums.s.value;
  sliders.val.value = nums.v.value;
  updateColor("num");
}));

document.getElementById("hexInput").addEventListener("keydown", e => { if (e.key==="Enter") hexToSliders(); });

// ─── Render Presets ──────────────────────────────────────
function makePresetBtn(p) {
  const { r, g, b } = hsvToRgb(p.h, p.s, p.v);
  const hex = rgbToHex(r, g, b);
  const btn = document.createElement("button");
  btn.className = "preset-btn";
  btn.dataset.h = p.h; btn.dataset.s = p.s; btn.dataset.v = p.v;
  btn.innerHTML = `
    <div class="preset-swatch" style="background:${hex}"></div>
    <div class="preset-name">${p.name}</div>
    <div class="preset-hsv">${p.h}, ${p.s}, ${p.v}</div>
  `;
  btn.addEventListener("click", () => setHSV(p.h, p.s, p.v));
  return btn;
}

const allGroups = Object.keys(PRESETS);

allGroups.forEach(group => {
  const lbl = document.createElement("div");
  lbl.className = "preset-group-label";
  lbl.textContent = group;
  const grid = document.createElement("div");
  grid.className = "presets-grid";
  PRESETS[group].forEach(p => grid.appendChild(makePresetBtn(p)));
  document.getElementById("allPresetsContainer").append(lbl, grid);
});

// init
updateColor("range");
</script>
</body>
</html>
